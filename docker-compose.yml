services:

  # ── PHP / Laravel ──────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nido_php
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    networks:
      - nido_net
    depends_on:
      - mariadb

  # ── Frontend React ─────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: nido_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - nido_net

  # ── Nginx ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nido_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - nido_net
    depends_on:
      - php

  # ── MariaDB ────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: nido_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: nido_db
      MYSQL_USER: nido_user
      MYSQL_PASSWORD: nido_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - nido_net

  # ── phpMyAdmin ────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nido_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: nido_user
      PMA_PASSWORD: nido_pass
    networks:
      - nido_net
    depends_on:
      - mariadb

volumes:
  mariadb_data:

networks:
  nido_net:
    driver: bridge